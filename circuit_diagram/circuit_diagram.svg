<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4A3728"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1400" height="900" fill="#F5F0E6"/>

  <!-- Title -->
  <text x="700" y="45" text-anchor="middle" font-size="26" font-weight="700" fill="#2B2118">IoT-Enabled Smart Agriculture Monitoring System — Circuit Diagram</text>
  <text x="700" y="70" text-anchor="middle" font-size="14" fill="#6B5B4A">ESP32 Dev Module · Soil Moisture · DHT22 · LDR · Water Level · Relay + Pump</text>

  <!-- ================= ESP32 CENTER BOARD ================= -->
  <rect x="560" y="330" width="280" height="260" rx="10" fill="#2B2118" stroke="#4A3728" stroke-width="3"/>
  <text x="700" y="365" text-anchor="middle" font-size="18" font-weight="700" fill="#F0E6D2">ESP32</text>
  <text x="700" y="385" text-anchor="middle" font-size="12" fill="#C9BBA3">Dev Module (Wi-Fi)</text>

  <!-- ESP32 left pins -->
  <circle cx="560" cy="410" r="4" fill="#D4A24C"/><text x="550" y="414" text-anchor="end" font-size="12" fill="#2B2118">GPIO34 (ADC)</text>
  <circle cx="560" cy="440" r="4" fill="#D4A24C"/><text x="550" y="444" text-anchor="end" font-size="12" fill="#2B2118">GPIO4</text>
  <circle cx="560" cy="470" r="4" fill="#D4A24C"/><text x="550" y="474" text-anchor="end" font-size="12" fill="#2B2118">GPIO35 (ADC)</text>
  <circle cx="560" cy="500" r="4" fill="#D4A24C"/><text x="550" y="504" text-anchor="end" font-size="12" fill="#2B2118">GPIO32 (ADC)</text>
  <circle cx="560" cy="530" r="4" fill="#D4A24C"/><text x="550" y="534" text-anchor="end" font-size="12" fill="#2B2118">3V3</text>
  <circle cx="560" cy="560" r="4" fill="#D4A24C"/><text x="550" y="564" text-anchor="end" font-size="12" fill="#2B2118">GND</text>

  <!-- ESP32 right pins -->
  <circle cx="840" cy="410" r="4" fill="#D4A24C"/><text x="850" y="414" text-anchor="start" font-size="12" fill="#2B2118">GPIO25</text>
  <circle cx="840" cy="440" r="4" fill="#D4A24C"/><text x="850" y="444" text-anchor="start" font-size="12" fill="#2B2118">5V (VIN)</text>
  <circle cx="840" cy="470" r="4" fill="#D4A24C"/><text x="850" y="474" text-anchor="start" font-size="12" fill="#2B2118">GND</text>

  <!-- ================= SOIL MOISTURE (top-left) ================= -->
  <rect x="120" y="120" width="220" height="90" rx="8" fill="#6B8E4E" stroke="#4A5F35" stroke-width="2"/>
  <text x="230" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#F0E6D2">Soil Moisture</text>
  <text x="230" y="170" text-anchor="middle" font-size="12" fill="#EAF0DE">Capacitive Sensor</text>
  <text x="230" y="188" text-anchor="middle" font-size="11" fill="#EAF0DE">AO · VCC · GND</text>
  <path d="M230,210 C230,280 400,340 558,408" fill="none" stroke="#4A3728" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="270" font-size="11" fill="#4A3728">AO → GPIO34</text>

  <!-- ================= DHT22 (top-right) ================= -->
  <rect x="1060" y="120" width="220" height="90" rx="8" fill="#4A90A4" stroke="#356374" stroke-width="2"/>
  <text x="1170" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#F0E6D2">DHT22</text>
  <text x="1170" y="170" text-anchor="middle" font-size="12" fill="#E0F0F4">Temp &amp; Humidity</text>
  <text x="1170" y="188" text-anchor="middle" font-size="11" fill="#E0F0F4">DATA · VCC · GND</text>
  <path d="M1170,210 C1170,280 1000,340 842,438" fill="none" stroke="#4A3728" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="990" y="270" font-size="11" fill="#4A3728">DATA → GPIO4</text>
  <text x="990" y="286" font-size="10" fill="#6B5B4A">(10kΩ pull-up to 3V3)</text>

  <!-- ================= LDR (bottom-left) ================= -->
  <rect x="120" y="690" width="220" height="90" rx="8" fill="#D4A24C" stroke="#A97E30" stroke-width="2"/>
  <text x="230" y="720" text-anchor="middle" font-size="15" font-weight="700" fill="#2B2118">LDR Sensor</text>
  <text x="230" y="740" text-anchor="middle" font-size="12" fill="#3A2E1E">Light Intensity</text>
  <text x="230" y="758" text-anchor="middle" font-size="11" fill="#3A2E1E">Voltage Divider Output</text>
  <path d="M230,690 C230,620 400,560 558,498" fill="none" stroke="#4A3728" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="600" font-size="11" fill="#4A3728">OUT → GPIO35</text>

  <!-- ================= WATER LEVEL (bottom-right) ================= -->
  <rect x="1060" y="690" width="220" height="90" rx="8" fill="#3E7CA6" stroke="#2C5A79" stroke-width="2"/>
  <text x="1170" y="720" text-anchor="middle" font-size="15" font-weight="700" fill="#F0E6D2">Water Level</text>
  <text x="1170" y="740" text-anchor="middle" font-size="12" fill="#E0F0F4">Float / Ultrasonic</text>
  <text x="1170" y="758" text-anchor="middle" font-size="11" fill="#E0F0F4">AO · VCC · GND</text>
  <path d="M1170,690 C1170,620 1000,560 842,528" fill="none" stroke="#4A3728" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="990" y="620" font-size="11" fill="#4A3728">AO → GPIO32</text>

  <!-- ================= RELAY + PUMP (far right) ================= -->
  <rect x="1060" y="380" width="180" height="70" rx="8" fill="#C1502E" stroke="#8E3A20" stroke-width="2"/>
  <text x="1150" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#F5EDE4">Relay Module</text>
  <text x="1150" y="428" text-anchor="middle" font-size="11" fill="#F5EDE4">IN · VCC(5V) · GND</text>
  <path d="M842,412 L1058,412" fill="none" stroke="#4A3728" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="920" y="404" font-size="11" fill="#4A3728">IN → GPIO25</text>

  <rect x="1280" y="380" width="90" height="70" rx="8" fill="#8FAE6B" stroke="#5F7A45" stroke-width="2"/>
  <text x="1325" y="410" text-anchor="middle" font-size="12" font-weight="700" fill="#22331A">Pump</text>
  <text x="1325" y="426" text-anchor="middle" font-size="10" fill="#22331A">(Irrigation)</text>
  <path d="M1240,415 L1278,415" fill="none" stroke="#4A3728" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ================= POWER SUPPLY (bottom center) ================= -->
  <rect x="605" y="700" width="190" height="80" rx="8" fill="#F0E6D2" stroke="#4A3728" stroke-width="2"/>
  <text x="700" y="730" text-anchor="middle" font-size="14" font-weight="700" fill="#2B2118">5V Power Supply</text>
  <text x="700" y="748" text-anchor="middle" font-size="11" fill="#4A3728">or Solar + 18650 + TP4056</text>
  <path d="M700,700 C700,650 700,620 700,592" fill="none" stroke="#4A3728" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="712" y="650" font-size="11" fill="#4A3728">5V / GND</text>

  <!-- ================= LEGEND ================= -->
  <rect x="40" y="820" width="18" height="18" fill="#6B8E4E"/><text x="64" y="834" font-size="12" fill="#2B2118">Soil Moisture</text>
  <rect x="200" y="820" width="18" height="18" fill="#4A90A4"/><text x="224" y="834" font-size="12" fill="#2B2118">DHT22</text>
  <rect x="320" y="820" width="18" height="18" fill="#D4A24C"/><text x="344" y="834" font-size="12" fill="#2B2118">LDR</text>
  <rect x="410" y="820" width="18" height="18" fill="#3E7CA6"/><text x="434" y="834" font-size="12" fill="#2B2118">Water Level</text>
  <rect x="560" y="820" width="18" height="18" fill="#C1502E"/><text x="584" y="834" font-size="12" fill="#2B2118">Relay / Pump</text>
  <rect x="710" y="820" width="18" height="18" fill="#F0E6D2" stroke="#4A3728"/><text x="734" y="834" font-size="12" fill="#2B2118">Power</text>

  <text x="700" y="875" text-anchor="middle" font-size="11" fill="#8A7A63">All analog sensors on ADC1 channels (GPIO32-39) to remain readable while Wi-Fi is active.</text>
</svg>
